# Mapping used with code-complexity-comparator
# (/data/henriksson/github/claude/code-complexity-comparator)
# to match bundled C++ SKESA sources in `SKESA/` with the Rust port in `src/`.
#
# Regenerate reports:
#   ccc-rs analyze SKESA -l cpp  --recurse -o analysis/skesa_cpp.json
#   ccc-rs analyze src   -l rust --recurse -o analysis/skesa_rust.json
# Compare with this mapping:
#   ccc-rs compare analysis/skesa_rust.json analysis/skesa_cpp.json \
#       --mapping ccc_mapping.toml --top 25
#   ccc-rs missing analysis/skesa_rust.json analysis/skesa_cpp.json \
#       --mapping ccc_mapping.toml
#
# Name convention:
#  - Rust: `rust = "method"` + `rust_class = "Type"` for inherent methods;
#    bare `rust = "fn"` for free functions.
#  - C++: `other` is the `name` field as recorded by ccc-rs: unqualified for
#    in-class definitions, `Class::Method` for out-of-class definitions.
#  - `other_path = "file.hpp"` / `other_path = "file.cpp"` disambiguates when
#    the same C++ name appears in more than one file.


